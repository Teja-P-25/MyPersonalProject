<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DriveSync | Luxury Rentals</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .hero { background: #222; color: white; padding: 60px 0; text-align: center; }
        .car-card { border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>DriveSync</h1>
        <p>Premium cars. 10-hour booking service.</p>
    </div>

    <div class="container mt-5">
        <div class="row">
            {% for car in cars %}
            <div class="col-md-4">
                <div class="card car-card">
                    <div class="card-body">
                        <h3>{{ car.name }}</h3>
                        <p class="text-primary font-weight-bold">${{ car.price }}/day</p>
                        <form action="/book" method="POST">
                            <input type="hidden" name="car_name" value="{{ car.name }}">
                            <input type="hidden" name="price" value="{{ car.price }}">
                            <label>How many days?</label>
                            <input type="number" name="days" class="form-control mb-2" value="1" min="1">
                            <button type="submit" class="btn btn-dark w-100">Book Now</button>
                        </form>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
